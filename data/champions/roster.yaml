# data/champions/roster.yaml — vendor スコープのマニフェスト（手動・コミット）。
# MVP では「全国図鑑の全種族」ではなく、サンプル team/ とドメインテストを完全に駆動する
# 代表種サブセット + 全 18 タイプの実相性表を vendor する。fetch-pokeapi.ts はここに列挙した
# PokeAPI slug のみ取得し data/raw にキャッシュ、generate.ts が data/generated を出力する。
# 全種族へ拡張する場合は本ファイルの列挙を広げて再取得・再生成すればよい（パイプラインは全種対応）。
#
# pokemon: PokeAPI の pokemon slug（フォルム/メガは固有 slug）。
# moves/items: vendor する技・持ち物（個体ファイルで参照するもの）。
# megaLinks: base SpeciesId -> メガ先 SpeciesId（種族の megaEvolvesTo を張る）。
pokemon:
  - garchomp
  - dragonite
  - salamence
  - metagross
  - rotom-wash
  - charizard
  - charizard-mega-x
  - mewtwo
  - dragapult
  - hydreigon
moves:
  - earthquake
  - dragon-claw
  - stone-edge
  - swords-dance
  - outrage
  - fire-punch
  - extreme-speed
  - draco-meteor
  - fire-blast
  - roost
  - meteor-mash
  - zen-headbutt
  - bullet-punch
  - hydro-pump
  - thunderbolt
  - volt-switch
  - will-o-wisp
  - flare-blitz
  - psystrike
  - ice-beam
  # dragapult / hydreigon（M-A 解禁）の個体で参照する技。
  - shadow-ball
  - dark-pulse
  - nasty-plot
items:
  - charizardite-x
  - rocky-helmet
  - life-orb
  - leftovers
  - assault-vest
  - choice-scarf
megaLinks:
  charizard: charizard-mega-x
# itemMeta: メガストーン等のメタ情報（megaStoneFor = メガ先 base SpeciesId）。
itemMeta:
  charizardite-x:
    megaStoneFor: charizard
