# data/champions/regulations/champions-m-a.yaml — レギュレーション M-A の解禁情報（手動・コミット）。
# 1 レギュ = 1 ファイル。解禁判定の正本（per-regulation 一本化・ADR 0021）。generate.ts が
# data/generated/regulations/champions-m-a/（index.ts=メタ + species.ts=per-reg 種族 dex）を出力する。
#
# period: 開催期間。start 必須・end は空（開催中）を許容。
# allow: このレギュで使える解禁集合。id は data/champions/catalog/*.yaml を参照する（参照切れは生成段でエラー）。
#   species: 構築に使える base 種族。  mega: 解禁メガ先（base + メガストーンで展開）。
#   items: 解禁持ち物。               moves: 解禁技（YAML 記録のみ・per-reg 型は生成しない）。
#
# 出典（2026-06 検証）: serebii.net/pokemonchampions/rankedbattle/regulationm-a.shtml /
# game8.co/games/Pokemon-Champions/archives/601460 / bulbapedia「List of Pokémon in Pokémon Champions」。
# M-A（2026-04-08〜06-17・基本最終進化・メガ可/テラス&ダイマ不可・Restricted なし）。
# salamence / metagross / mewtwo は catalog 在籍だが allow 不在 = 未解禁（demo 用）。
name:
  en: "Champions Regulation M-A"
  ja: "チャンピオンズ レギュレーションM-A"
period:
  start: "2026-04-08"
  end: "2026-06-17"
allow:
  species:
    - garchomp
    - dragonite
    - rotom-wash
    - charizard
    - dragapult
    - hydreigon
    # M-A 解禁・無作為20匹サンプル（Phase 3・docs/plan/02-data-model-redesign/ma-roster-source.md）。
    - aggron
    - alakazam
    - arcanine
    - blastoise
    - chandelure
    - corviknight
    - decidueye
    - excadrill
    - garganacl
    - gengar
    - greninja
