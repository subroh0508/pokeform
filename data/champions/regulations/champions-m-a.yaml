# data/champions/regulations/champions-m-a.yaml — レギュレーション M-A の解禁情報（手動・コミット）。
# 1 レギュ = 1 ファイル。解禁判定の正本（per-regulation 一本化・ADR 0021 / 記録方法 ADR 0022）。
#
# 記録方法（ADR 0022・block 記法）:
#   name / period / items は予約キー。それ以外のトップレベルキー = 解禁種族（キーの存在 = allow）。
#   各種族キー下に moves（per-reg 習得技）と、メガ運用種族は mega（配列・複数メガ可）をコロケーション。
#   id は data/champions/catalog/*.yaml を参照する（覚えない技 / 参照切れは check:regulation が検証して弾く）。
#
# 出典（2026-06-10 検証・docs/plan/02-data-model-redesign/ma-roster-source.md）:
#   serebii.net / game8 / bulbapedia / pokemondb pokebase / games.gg / pokemon-zone。M-A（2026-04-08〜06-17・
#   基本最終進化・メガ可 / テラス&ダイマ不可・Restricted なし）。持ち物は M-A の絞られたプール（life-orb /
#   assault-vest / rocky-helmet 等は非解禁）。各種族 moves は learnset ∩ M-A legal の競技準拠サブセット。

